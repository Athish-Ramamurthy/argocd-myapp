apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-argo-application
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Athish-Ramamurthy/argocd-demo.git
    targetRevision: HEAD
    path: dev
  
  destination: 
    server: https://kubernetes.default.svc
    namespace: myapp

  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: myapp
      jsonPointers:
        - /spec/replicas

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
